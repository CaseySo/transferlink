<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransferLink Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="home-container">

    <!-- ===== Hero / Greeting ===== -->
    <div class="hero">
      <h1 id="greeting">Welcome!</h1>
      <p id="profile-info"></p> <!-- This will show major, college, interests -->
      <p id="subtext">Here's what's happening on campus today.</p>
    </div>

    <!-- ===== Top Navigation Pills ===== -->
    <div class="top-nav">
    <button class="nav-pill" onclick="navigateTo('home.html')" id="home-pill">Home</button>
    <button class="nav-pill" onclick="navigateTo('events.html')" id="events-pill">Events</button>
    <button class="nav-pill" onclick="navigateTo('community.html')" id="community-pill">Community</button>
    <button class="nav-pill selected" onclick="navigateTo('courses.html')" id="courses-pill">Courses</button>
    <button class="nav-pill" onclick="navigateTo('guide.html')" id="guide-pill">Guide</button>
    </div>

    <!-- ===== Recommended Section ===== -->
    <h2>Recommended for you</h2>
    <div id="recommendations" class="card-container">
      <!-- dynamically filled via JS -->
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
