<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransferLink Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="home-container">

    <!-- ===== Greeting ===== -->
    <div class="hero">
    <h1 id="greeting">Welcome to UCSD!</h1>
    <p id="subtext"></p>
    </div>

    <!-- ===== Top Navigation Pills ===== -->
    <div class="top-nav">
      <button class="nav-pill">Events</button>
      <button class="nav-pill">Community</button>
      <button class="nav-pill">Courses</button>
      <button class="nav-pill">Guide</button>
    </div>

    <!-- ===== Recommended Section ===== -->
    <h2>Recommended for you</h2>
    <div id="recommendations" class="card-container">
      <!-- dynamically filled -->
    </div>

    <!-- ===== Quick Tools ===== -->
    <h2>Quick Tools</h2>
    <div class="card-container">

      <div class="card">
        <h3>Course Planner</h3>
        <p>See what classes to take next</p>
      </div>

      <div class="card">
        <h3>Transfer Guide</h3>
        <p>Learn how UCSD systems work</p>
      </div>

      <div class="card">
        <h3>Find Clubs</h3>
        <p>Meet people with similar interests</p>
      </div>

    </div>

  </div>

  <script src="js/home.js"></script>
</body>
</html>
