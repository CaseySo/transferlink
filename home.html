<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransferLink Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="home-container">

    <!-- ===== Hero / Greeting ===== -->
    <div class="hero">
      <h1 id="greeting">Welcome!</h1>
      <p id="profile-info"></p> <!-- This will show major, college, interests -->
      <p id="subtext">Here's what's happening on campus today.</p>
    </div>

    <!-- ===== Top Navigation Pills ===== -->
    <div class="top-nav">
      <button class="nav-pill" onclick="navigateTo('events.html')">Events</button>
      <button class="nav-pill" onclick="navigateTo('community.html')">Community</button>
      <button class="nav-pill" onclick="navigateTo('courses.html')">Courses</button>
      <button class="nav-pill" onclick="navigateTo('guide.html')">Guide</button>
    </div>

    <!-- ===== Recommended Section ===== -->
    <h2>Recommended for you</h2>
    <div id="recommendations" class="card-container">
      <!-- dynamically filled via JS -->
    </div>

    <!-- ===== Quick Tools Section ===== -->
    <h2>Quick Tools</h2>
    <div class="card-container">
      <div class="card" onclick="navigateTo('courses.html')">
        <h3>Course Planner</h3>
        <p>See what classes to take next</p>
      </div>

      <div class="card" onclick="navigateTo('guide.html')">
        <h3>Transfer Guide</h3>
        <p>Learn how UCSD systems work</p>
      </div>

      <div class="card" onclick="navigateTo('community.html')">
        <h3>Find Clubs</h3>
        <p>Meet people with similar interests</p>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
