<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community</title>
  <link rel="stylesheet" href="css/community.css">
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1>Community</h1>
  <p>Connect with people, clubs, and study groups personalized for you.</p>
  <p>Click on cards for more info.</p>
</section>

<!-- Navigation -->
<div class="top-nav">
  <button class="nav-pill" onclick="navigateTo('home.html')">Home</button>
  <button class="nav-pill" onclick="navigateTo('events.html')">Events</button>
  <button class="nav-pill selected">Community</button>
  <button class="nav-pill" onclick="navigateTo('courses.html')">Courses</button>
  <button class="nav-pill" onclick="navigateTo('guide.html')">Guide</button>
</div>

<!-- 👥 PEOPLE CAROUSEL -->
<section class="section">
  <h2>People Like You</h2>
  <div id="people-carousel" class="carousel"></div>
</section>

<!-- 🧑‍🤝‍🧑 CLUBS -->
<section class="section">
  <h2>Clubs You Might Like </h2>
  <div id="clubs-container" class="cards-grid"></div>
</section>

<!-- 📚 STUDY GROUPS -->
<section class="section">
  <h2>Study Groups</h2>
  <div id="groups-container" class="cards-grid"></div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-btn" id="close-modal">&times;</span>
    <img id="modal-img">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <p id="modal-extra"></p>
  </div>
</div>

<script src="js/community.js"></script>
</body>
</html>
