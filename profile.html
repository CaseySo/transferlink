<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="profile-bg">
    <div class="login-box">

      <h1>Set up your profile</h1>
      <p>Help us personalize your TransferLink experience!</p>

      <!-- ===== Name ===== -->
      <p class="section-label">Your Name</p>
      <input type="text" id="name" class="text-input" placeholder="Enter your name" />

      <!-- ===== Major + College Row ===== -->
      <div class="row">

        <!-- ===== Major ===== -->
        <div class="field">
            <p class="section-label">Major</p>
            <input type="text" id="major-search" class="text-input" placeholder="Search major..." />
            <div id="major-dropdown" class="dropdown-list"></div>
        </div>

        <!-- ===== College ===== -->
        <div class="field">
            <p class="section-label">College</p>
            <input type="text" id="college-search" class="text-input" placeholder="Search college..." />
            <div id="college-dropdown" class="dropdown-list"></div>
        </div>

        </div>
      <!-- ===== Interests ===== -->
      <p class="section-label">Select your top 3 interests</p>
      <p id="interest-count" class="interest-count">0 interests selected</p>
      <div class="interests-list">

        <button class="interest-btn" data-interest="Fitness">Fitness</button>
        <button class="interest-btn" data-interest="Culture">Culture</button>
        <button class="interest-btn" data-interest="Music">Music</button>

        <button class="interest-btn" data-interest="Art">Art</button>
        <button class="interest-btn" data-interest="Gaming">Gaming</button>
        <button class="interest-btn" data-interest="Travel">Travel</button>

        <button class="interest-btn" data-interest="Nature">Nature</button>
        <button class="interest-btn" data-interest="Performing">Performing</button>
        <button class="interest-btn" data-interest="Professional Development">Professional Development</button>

      </div>

      <!-- ===== Finish ===== -->
      <button class="finish-btn" onclick="finishProfile()">Finish</button>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
