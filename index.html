<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransferLink Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-background">
    <div class="login-box">
      
      <!-- UCSD logo -->
      <img src="images/triton.png" alt="UCSD Logo" class="logo">

      <!-- Welcome text -->
      <h1>Welcome to UCSD!</h1>
      <p>Your TransferLink companion for UCSD students.</p>

      <!-- Email input -->
      <input type="email" id="email" placeholder="Enter your UCSD email" />

      <!-- Start button -->
      <button onclick="startApp()">Start</button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
